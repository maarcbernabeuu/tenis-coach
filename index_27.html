<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0e1a14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Tennis Coach"/>
<title>Tennis Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e1a14;--bg2:#162019;--bg3:#1d2b22;--green:#1D9E75;--gl:#5DCAA5;--white:#eef2ee;--muted:#7a9080;--border:rgba(93,202,165,0.14);--amber:#EF9F27;--red:#D85A30}
html,body{background:var(--bg);height:100%;font-family:'DM Sans',sans-serif;color:var(--white);-webkit-tap-highlight-color:transparent}
.app{min-height:100vh;min-height:100dvh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gl);display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0}
.content{padding:16px;max-width:600px;margin:0 auto;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;-webkit-appearance:none;display:inline-flex;align-items:center;gap:6px}
.btn:active{opacity:.75}
.btn-green{background:var(--green);color:#fff}
.btn-green:disabled{opacity:.38;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--green);color:var(--gl)}
.btn-wha{background:#25D366;color:#fff;text-decoration:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:7px}
.btn-sm{padding:7px 13px;font-size:12px}
.btn-back{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0 0 14px;display:flex;align-items:center;gap:5px}
.btn-del{background:none;border:none;color:#8B1A1A;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
.btn-danger{background:none;border:none;color:#8B1A1A;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.card-click{cursor:pointer;transition:border-color .2s}
.card-click:active{border-color:rgba(93,202,165,.35)}
.lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;display:block}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--green)}
.inp::placeholder{color:var(--muted)}
textarea.inp{resize:vertical;min-height:80px;font-size:14px}
select.inp{cursor:pointer}
.ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;margin-bottom:4px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.stars{display:flex;gap:4px;align-items:center}
.star{font-size:22px;cursor:pointer;transition:transform .1s;user-select:none;line-height:1}
.star:active{transform:scale(1.3)}
.star-sm{font-size:15px;cursor:default;line-height:1}
.sk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sk-grid .sk-card:last-child:nth-child(odd){grid-column:span 2}
.sk-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px}
.sk-name{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:19px;flex-shrink:0}
.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat{background:var(--bg3);border-radius:12px;padding:12px 6px;flex:1;text-align:center}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gl);line-height:1}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px}
.notif-box{background:linear-gradient(135deg,#091f15,#0f2419);border:1px solid rgba(29,158,117,.4);border-radius:14px;padding:16px;margin-bottom:14px}
.notif-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.notif-dot{width:7px;height:7px;border-radius:50%;background:#25D366}
.notif-tag{font-size:11px;font-weight:600;color:var(--gl);text-transform:uppercase;letter-spacing:.8px}
.notif-edit{font-size:11px;color:var(--muted);margin-left:auto}
.notif-ta{width:100%;background:#0a1c11;border:1px solid rgba(93,202,165,.2);border-radius:10px;padding:12px;font-size:13px;color:var(--white);font-family:'DM Sans',sans-serif;line-height:1.7;resize:vertical;min-height:120px;outline:none}
.notif-ta:focus{border-color:var(--green)}
.notif-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.hint{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.court-line{width:36px;height:3px;background:var(--green);border-radius:99px;margin:0 auto 14px}
.fade{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cls-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.sk-pill{background:var(--bg3);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted)}
.score-big{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amber)}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.tab.on{background:var(--green);border-color:var(--green);color:#fff}
.progress-bar-wrap{flex:1;height:5px;background:#0e1a14;border-radius:99px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width .4s}
.apikey-box{background:rgba(239,159,39,.07);border:1px solid rgba(239,159,39,.25);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--amber);line-height:1.6}
.dot-loading::after{content:'.';animation:dots 1.2s steps(3,end) infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
</style>
</head>

function todayStr(){return new Date().toISOString().split("T")[0]}
function calcAge(birthdate){
  if(!birthdate)return null;
  const b=new Date(birthdate),now=new Date();
  let age=now.getFullYear()-b.getFullYear();
  const m=now.getMonth()-b.getMonth();
  if(m<0||(m===0&&now.getDate()<b.getDate()))age--;
  return age;
}
function fmtDate(iso){return new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"short"})}
function fmtDateLong(iso){return new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"})}
function initials(n){return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)}
function lc(lv){return LCOLOR[lv]||"#5F5E5A"}
function avgR(s){if(!s.classes?.length)return null;return(s.classes.reduce((a,c)=>a+c.rating,0)/s.classes.length).toFixed(1)}
function rlabel(r){return["","A mejorar","Regular","Bien","Muy bien","Excelente"][Math.round(r)]||""}
async function persist(){}
async function addStudentDB(data){
  const ref = await addDoc(collection(db,"students"),{...data,classes:[],createdAt:new Date().toISOString()});
  return ref.id;
}
async function updateStudentDB(id,data){
  await updateDoc(doc(db,"students",id),data);
}
async function removeStudentDB(id){
  await deleteDoc(doc(db,"students",id));
}
async function loadStudents(){
  const snap = await getDocs(query(collection(db,"students"),orderBy("name")));
  students = snap.docs.map(d=>({id:d.id,...d.data(),classes:d.data().classes||[]}));
}

function saveKey(k){apiKey=k;try{localStorage.setItem("tenis_key",k)}catch{}}

function el(tag,attrs,inner){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==="class")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(typeof inner==="string")e.innerHTML=inner;
  else if(Array.isArray(inner))inner.forEach(c=>c&&e.appendChild(c));
  return e;
}

function starsWidget(val,size,onChange){
  const wrap=el("div",{class:"stars"});
  [1,2,3,4,5].forEach(n=>{
    const s=el("span",{class:size==="sm"?"star-sm":"star"},"");
    s.textContent=val>=n?STAR_ON:STAR_OFF;
    s.style.color=val>=n?"#EF9F27":"#2a3e2e";
    if(onChange)s.addEventListener("click",()=>onChange(n));
    wrap.appendChild(s);
  });
  return wrap;
}

function starsRO(val,size){return starsWidget(val,size,null)}

async function genMsg(student,cls){
  const st=Object.entries(cls.skills||{}).filter(([,v])=>v>0).map(([k,v])=>`${k}: ${v}/5`).join(", ");
  const prompt=`Eres un entrenador de tenis cercano y profesional. Redacta un mensaje de WhatsApp corto y motivador para tu alumno ${student.name} tras la clase de hoy. Valoracion: ${cls.rating}/5 (${rlabel(cls.rating)}). Aspectos: ${st||"varios"}. Notas: ${cls.notes||"sin notas"}. Maximo 4 frases, espanol, SIN EMOJIS, sin asteriscos, positivo. Firma como Tu entrenador.`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:300,messages:[{role:"user",content:prompt}]})
  });
  const d=await res.json();
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  return d.content?.[0]?.text||"";
}

function waLink(phone,msg){
  const p=(phone||"").replace(/\D/g,"");
  const n=p?(p.startsWith("34")?p:"34"+p):"";
  return`https://wa.me/${n}?text=${encodeURIComponent(msg)}`;
}

function renderList(){
  const c=document.getElementById("content");
  c.className="content fade";
  c.innerHTML="";

  const sorted=[...students].sort((a,b)=>a.name.localeCompare(b.name));
  const hdr=el("div",{style:"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px"});
  const info=el("div",{});
  info.appendChild(el("div",{class:"ttl"},"Mis alumnos"));
  info.appendChild(el("div",{style:"font-size:13px;color:#7a9080"},(students.length)+" alumno"+(students.length!==1?"s":"")));
  hdr.appendChild(info);
  c.appendChild(hdr);
  if(!students.length){
    const emp=el("div",{class:"empty"});

    c.appendChild(emp);return;
  }
  sorted.forEach(s=>{
    const a=avgR(s),last=s.classes?.[0];
    const card=el("div",{class:"card card-click",onclick:()=>{selId=s.id;tab="clases";notif={text:"",loading:false,show:false};view="student";render()}});
    const row=el("div",{style:"display:flex;align-items:center;gap:13px"});

    const mid=el("div",{style:"flex:1"});
    mid.appendChild(el("div",{style:"font-weight:600;font-size:15px;margin-bottom:5px"},s.name));
    const badges=el("div",{style:"display:flex;gap:6px;flex-wrap:wrap"});
    badges.appendChild(el("span",{class:"badge",style:`background:${lc(s.level)}22;color:${lc(s.level)}`},s.level));
    const sAge=calcAge(s.birthdate);
    if(sAge!==null)badges.appendChild(el("span",{class:"badge",style:"background:#1d2b22;color:#7a9080"},sAge+" años"));
    if(a)badges.appendChild(el("span",{class:"badge",style:"background:#1d2b22;color:#EF9F27"},a+" ★"));
    else badges.appendChild(el("span",{class:"badge",style:"background:#1d2b22;color:#7a9080"},"Sin clases"));
    mid.appendChild(badges);
    const right=el("div",{style:"text-align:right;flex-shrink:0"});
    right.appendChild(el("div",{style:"font-family:'Bebas Neue',sans-serif;font-size:22px;color:#5DCAA5;line-height:1"},(s.classes?.length||0)+""));
    right.appendChild(el("div",{style:"font-size:11px;color:#7a9080"},"clases"));
    if(last)right.appendChild(el("div",{style:"font-size:11px;color:#3a4f3e;margin-top:2px"},fmtDate(last.date)));
    row.appendChild(av);row.appendChild(mid);row.appendChild(right);
    card.appendChild(row);c.appendChild(card);
  });
}

function renderAddClass(){
  const sel=getSel();
  const c=document.getElementById("content");
  c.className="content fade";c.innerHTML="";
  c.appendChild(el("button",{class:"btn-back",onclick:()=>{view="student";render()}},"← "+sel.name));
  c.appendChild(el("div",{class:"ttl",style:"margin-bottom:16px"},"Registrar clase"));
  const box=el("div",{class:"card"});
  box.appendChild(el("label",{class:"lbl"},"Fecha"));
  const dateInp=el("input",{class:"inp",type:"date"});
  dateInp.value=nc.date;
  dateInp.addEventListener("change",e=>nc.date=e.target.value);
  box.appendChild(dateInp);
  box.appendChild(el("label",{class:"lbl"},"Valoración global"));
  const starsRow=el("div",{style:"display:flex;align-items:center;gap:8px;margin-bottom:14px"});
  const starsW=el("div",{class:"stars"});
  const ratingLbl=el("span",{style:"font-size:13px;color:#EF9F27;font-weight:600"},nc.rating?rlabel(nc.rating):"");
  function updateStars(){
    starsW.innerHTML="";
    [1,2,3,4,5].forEach(n=>{
      const s=el("span",{class:"star"},nc.rating>=n?STAR_ON:STAR_OFF);
      s.style.color=nc.rating>=n?"#EF9F27":"#2a3e2e";
      s.addEventListener("click",()=>{nc.rating=n;ratingLbl.textContent=rlabel(n);updateStars();saveBtn.disabled=false});
      starsW.appendChild(s);
    });
  }
  updateStars();
  starsRow.appendChild(starsW);starsRow.appendChild(ratingLbl);
  box.appendChild(starsRow);
  box.appendChild(el("label",{class:"lbl"},"Aspectos trabajados"));
  const grid=el("div",{class:"sk-grid"});
  SKILLS.forEach(sk=>{
    const card=el("div",{class:"sk-card"});
    card.appendChild(el("div",{class:"sk-name"},sk));
    const sw=el("div",{class:"stars"});
    function updateSk(){
      sw.innerHTML="";
      [1,2,3,4,5].forEach(n=>{
        const s=el("span",{class:"star",style:"font-size:18px"},( nc.skills[sk]||0)>=n?STAR_ON:STAR_OFF);
        s.style.color=(nc.skills[sk]||0)>=n?"#EF9F27":"#2a3e2e";
        s.addEventListener("click",()=>{nc.skills[sk]=n;updateSk()});
        sw.appendChild(s);
      });
    }
    updateSk();
    card.appendChild(sw);
    grid.appendChild(card);
  });
  const attCard=el("div",{class:"sk-card",style:"grid-column:span 2"});
  attCard.appendChild(el("div",{class:"sk-name"},"Asistencia"));
  const attBtns=el("div",{style:"display:flex;gap:8px"});
  const btnSi=el("button",{});btnSi.textContent="✓ Sí";
  const btnNo=el("button",{});btnNo.textContent="✗ No";
  const bs="flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all .15s";
  btnSi.style.cssText=bs+";background:#1D9E75;color:#fff";
  btnNo.style.cssText=bs+";background:#1d2b22;color:#7a9080";
  btnSi.onclick=()=>{nc.attended=true;btnSi.style.background="#1D9E75";btnSi.style.color="#fff";btnNo.style.background="#1d2b22";btnNo.style.color="#7a9080";};
  btnNo.onclick=()=>{nc.attended=false;btnNo.style.background="#D85A30";btnNo.style.color="#fff";btnSi.style.background="#1d2b22";btnSi.style.color="#7a9080";};
  attBtns.appendChild(btnSi);attBtns.appendChild(btnNo);
  attCard.appendChild(attBtns);grid.appendChild(attCard);
  box.appendChild(grid);
  box.appendChild(el("label",{class:"lbl"},"Notas del entrenador"));
  const ta=el("textarea",{class:"inp",placeholder:"Observaciones, ejercicios realizados, puntos a mejorar..."});
  ta.value=nc.notes;
  ta.addEventListener("input",e=>nc.notes=e.target.value);
  box.appendChild(ta);
  const saveBtn=el("button",{class:"btn btn-green",style:"width:100%;font-size:14px",onclick:async()=>{
    if(!nc.rating)return;
    saveBtn.disabled=true;saveBtn.textContent="Guardando...";
    const cls={id:Date.now().toString(),...JSON.parse(JSON.stringify(nc)),coach:currentUser?.displayName||"",coachEmail:currentUser?.email||""};
    const idx=students.findIndex(s=>s.id===selId);
    if(!students[idx].classes)students[idx].classes=[];
    const newClasses=[cls,...students[idx].classes];
    await updateStudentDB(selId,{classes:newClasses});
    students[idx].classes=newClasses;
    view="student";tab="clases";
    const st=Object.entries(cls.skills||{}).filter(([,v])=>v>0).map(([k])=>k).join(", ");
    const ratingTexts=["","Hay que seguir trabajando duro","Vamos mejorando poco a poco","Buena clase hoy","Muy buena clase hoy","Clase excelente hoy"];
    const ratingExtra=["","Los fundamentos se iran asentando con constancia","Se nota la progresion, sigue asi","Se nota el trabajo que estas haciendo","Estas en un gran momento de forma","Ha sido una sesion de diez"];
    const r=Math.round(cls.rating)||3;
    const skText=st?`Hemos trabajado especialmente ${st}.`:"";
    const notesHint=cls.notes?` ${cls.notes.split(".")[0]}.`:"";
    const msg=`Hola ${sel.name}, ${ratingTexts[r]}.${notesHint} ${skText} ${ratingExtra[r]}, nos vemos en la proxima sesion. Tu entrenador/a`;
    notif={text:msg,loading:false,show:true};
    renderStudent();
  }},"Guardar y generar mensaje");
  saveBtn.disabled=!nc.rating;
  box.appendChild(saveBtn);
  c.appendChild(box);
}

      ta.addEventListener("input",()=>waA.href=waLink(s.phone,ta.value));

    }
    c.appendChild(nb);
  }
  const tabsEl=el("div",{class:"tabs"});
  ["clases","progreso"].forEach(t=>{
    const b=el("button",{class:"tab"+(tab===t?" on":""),onclick:()=>{tab=t;renderStudent()}},t.charAt(0).toUpperCase()+t.slice(1));
    tabsEl.appendChild(b);
  });
  c.appendChild(tabsEl);
  if(tab==="clases"){
    if(!s.classes?.length){
      const emp=el("div",{class:"empty"});
      emp.appendChild(el("div",{class:"court-line"}));
      emp.appendChild(el("p",{style:"font-size:13px"},"Sin clases aún. Pulsa + Clase."));
      c.appendChild(emp);
    } else {

        const ch=el("div",{style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"});
        const dateRow=el("div",{style:"display:flex;align-items:center;gap:8px"});
        dateRow.appendChild(el("span",{style:"font-size:12px;color:#7a9080;font-weight:500"},fmtDateLong(cls.date)));
        if(cls.attended===false)dateRow.appendChild(el("span",{class:"badge",style:"background:rgba(216,90,48,0.15);color:#D85A30;font-size:10px"},"No asistió"));
        ch.appendChild(dateRow);
        const cr=el("div",{style:"display:flex;align-items:center;gap:8px"});
        cr.appendChild(el("span",{class:"score-big"},cls.rating+"/5"));
        cr.appendChild(starsRO(cls.rating,"sm"));
        const db=el("button",{class:"btn-del",onclick:async()=>{
          if(!confirm("¿Eliminar esta clase?"))return;
          const idx=students.findIndex(s=>s.id===selId);
          const newCls=students[idx].classes.filter(x=>x.id!==cls.id);
          await updateStudentDB(selId,{classes:newCls});
          students[idx].classes=newCls;
          renderStudent();
        }},"×");
        cr.appendChild(db);ch.appendChild(cr);cd.appendChild(ch);
        const sks=Object.entries(cls.skills||{}).filter(([,v])=>v>0);
        if(sks.length){
          const sp=el("div",{style:"display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px"});
          sks.forEach(([sk,v])=>sp.appendChild(el("span",{class:"sk-pill"},sk+" "+"★".repeat(v))));
          cd.appendChild(sp);
        }
        if(cls.notes)cd.appendChild(el("p",{style:"font-size:13px;color:#7a9080;line-height:1.6"},cls.notes));
        c.appendChild(cd);
      });
    }
  }
  if(tab==="progreso"){
    const data=[...s.classes||[]].reverse();
    if(data.length<2){
      const emp=el("div",{class:"empty"});
      emp.appendChild(el("div",{class:"court-line"}));
      emp.appendChild(el("p",{style:"font-size:13px"},"Necesitas al menos 2 clases para ver el progreso."));
      c.appendChild(emp);
    } else {
      const W=document.getElementById("content").clientWidth-32;
      const H=170,PL=32,PR=16,PT=10,PB=24;
      const IW=W-PL-PR,IH=H-PT-PB;
      const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("width",W);svg.setAttribute("height",H);svg.style.display="block";
      const NSVG="http://www.w3.org/2000/svg";
      function svgEl(tag,attrs){const e=document.createElementNS(NSVG,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e}
      [1,2,3,4,5].forEach(v=>{
        const y=PT+IH-(v/5)*IH;
        svg.appendChild(svgEl("line",{x1:PL,y1:y,x2:PL+IW,y2:y,stroke:"rgba(93,202,165,0.07)",strokeWidth:"1"}));
        const t=document.createElementNS(NSVG,"text");t.textContent=v;
        t.setAttribute("x",PL-4);t.setAttribute("y",y+4);t.setAttribute("text-anchor","end");
        t.setAttribute("font-size","10");t.setAttribute("fill","#7a9080");svg.appendChild(t);
      });
      const xStep=IW/(data.length-1);
      const pts=data.map((d,i)=>({x:PL+i*xStep,y:PT+IH-(d.rating/5)*IH,d}));
      const polyline=document.createElementNS(NSVG,"polyline");
      polyline.setAttribute("points",pts.map(p=>`${p.x},${p.y}`).join(" "));
      polyline.setAttribute("fill","none");polyline.setAttribute("stroke","#1D9E75");polyline.setAttribute("stroke-width","2");
      svg.appendChild(polyline);
      pts.forEach(p=>{
        const col=p.d.rating>=4?"#5DCAA5":p.d.rating>=3?"#EF9F27":"#D85A30";
        svg.appendChild(svgEl("circle",{cx:p.x,cy:p.y,r:"5",fill:col,stroke:"#0e1a14","stroke-width":"2"}));
        if(pts.length<=8){
          const t=document.createElementNS(NSVG,"text");t.textContent=fmtDate(p.d.date);
          t.setAttribute("x",p.x);t.setAttribute("y",H-4);t.setAttribute("text-anchor","middle");
          t.setAttribute("font-size","10");t.setAttribute("fill","#7a9080");svg.appendChild(t);
        }
      });
      const chartBox=el("div",{class:"chart-wrap"});
      chartBox.appendChild(el("div",{class:"chart-title"},"Evolución de la valoración"));
      chartBox.appendChild(svg);c.appendChild(chartBox);
      const skillAvgs=SKILLS.map(sk=>{
        const wsk=s.classes.filter(x=>x.skills?.[sk]>0);
        const a=wsk.length?(wsk.reduce((s,x)=>s+(x.skills[sk]||0),0)/wsk.length).toFixed(1):null;
        return{name:sk,avg:a};
      }).filter(x=>x.avg);
      if(skillAvgs.length){
        c.appendChild(el("div",{style:"font-size:11px;font-weight:600;color:#7a9080;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px"},"Media por aspecto"));
        const sg=el("div",{class:"sk-grid"});
        skillAvgs.forEach(({name,avg:a})=>{
          const sc=el("div",{class:"sk-card"});
          sc.appendChild(el("div",{class:"sk-name"},name));
          const row=el("div",{style:"display:flex;align-items:center;gap:8px"});
          const bw=el("div",{class:"progress-bar-wrap"});
          const pct=(a/5)*100;
          const bar=el("div",{class:"progress-bar",style:`width:${pct}%;background:${a>=4?"#1D9E75":a>=3?"#EF9F27":"#D85A30"}`});
          bw.appendChild(bar);row.appendChild(bw);
          row.appendChild(el("span",{style:"font-size:12px;color:#EF9F27;font-weight:600;min-width:22px"},a+""));
          sc.appendChild(row);sg.appendChild(sc);
        });
        c.appendChild(sg);
      }
    }
  }
  c.appendChild(el("div",{class:"divider"}));
  const foot=el("div",{style:"text-align:right"});
  foot.appendChild(el("button",{class:"btn-danger",onclick:()=>{
    if(!confirm("¿Eliminar a "+s.name+" y todas sus clases?"))return;
    removeStudentDB(selId).then(async()=>{await loadStudents();view="list";render();});
  }},"Eliminar alumno"));
  c.appendChild(foot);
}

}

      const result = await signInWithPopup(auth, new GoogleAuthProvider());
      if(result?.user) await enterCoachApp(result.user);
    } catch(e){
      if(e.code === "auth/popup-blocked" || e.code === "auth/popup-closed-by-user"){
        try{ await signInWithRedirect(auth, new GoogleAuthProvider()); }
        catch(e2){ if(errEl) errEl.style.display="block"; }
      } else if(e.code !== "auth/cancelled-popup-request"){
        if(errEl) errEl.style.display="block";
      }
    }
  };
  document.getElementById("student-btn").onclick = () => {
    const a = document.getElementById("student-area");
    a.style.display = a.style.display==="none"?"block":"none";
    document.getElementById("coach-area").style.display="none";
  };
  document.getElementById("student-access-btn").onclick = async () => {
    const pin = document.getElementById("pin-input").value;
    const nameQ = document.getElementById("name-input").value.trim().toLowerCase();
    const dateQ = document.getElementById("date-input").value;
    const errEl = document.getElementById("student-error");
    const btn = document.getElementById("student-access-btn");
    if(pin!==STUDENT_PIN||!nameQ||!dateQ){ errEl.style.display="block"; return; }
    btn.disabled=true; btn.textContent="Verificando...";
    try{ await loadStudents(); }catch(e){}
    const found = students.find(s=>{
      const nm = s.name.toLowerCase().includes(nameQ)||nameQ.includes(s.name.toLowerCase().split(" ")[0]);
      return nm && s.birthdate===dateQ;
    });
    btn.disabled=false; btn.textContent="Ver mis clases";
    if(found){ 
      errEl.style.display="none"; 
      renderStudentDetail(found); 
    } else { 
      errEl.textContent = "PIN, nombre o fecha incorrectos. Asegúrate de que el nombre y la fecha de nacimiento coinciden exactamente con los que tiene el club.";
      errEl.style.display="block"; 
    }
  };

let cachedUser = null;

onAuthStateChanged(auth, async user => {
  cachedUser = user;
  // Always show login screen - let user choose their role
  // If already authenticated as coach, update the coach button
  renderLoginScreen();
  if(user && AUTHORIZED_COACHES.includes(user.email)){
    // Show "Continuar" button instead of Google login
    const coachArea = document.getElementById("coach-area");
    const googleBtn = document.getElementById("google-btn");
    if(coachArea && googleBtn){
      googleBtn.style.display = "none";
      const continueBtn = document.createElement("button");
      continueBtn.style.cssText = "width:100%;background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px";
      if(user.photoURL){ continueBtn.innerHTML=`<img src="${user.photoURL}" style="width:22px;height:22px;border-radius:50%"/> Continuar como ${user.displayName?.split(" ")[0]||"entrenador"}`; }
      else { continueBtn.textContent = `Continuar como ${user.displayName?.split(" ")[0]||"entrenador"}`; }
      continueBtn.onclick = () => enterCoachApp(user);
      coachArea.insertBefore(continueBtn, coachArea.firstChild);
      const changeBtn = document.createElement("button");
      changeBtn.style.cssText = "width:100%;background:transparent;color:#7a9080;border:1px solid rgba(93,202,165,0.14);border-radius:10px;padding:9px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px";
      changeBtn.textContent = "Cambiar de cuenta";
      changeBtn.onclick = async () => { await signOut(auth); renderLoginScreen(); };
      coachArea.appendChild(changeBtn);
    }
  }
});
