html,body{background:var(--bg);background-image:var(--bgimg);background-size:cover;background-position:center;background-attachment:fixed;height:100%;font-family:'DM Sans',sans-serif;color:var(--white);-webkit-tap-highlight-color:transparent}
.app{min-height:100vh;min-height:100dvh;position:relative}.app::before{content:'';position:fixed;inset:0;background:rgba(3,3,12,0.72);z-index:0;pointer-events:none}.app>*{position:relative;z-index:1}
.header{position:sticky;top:0;z-index:100;background:rgba(3,3,12,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.08);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gl);display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0}
.content{padding:16px;max-width:600px;margin:0 auto;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;-webkit-appearance:none;display:inline-flex;align-items:center;gap:6px}
.btn:active{opacity:.75}
.btn-green{background:var(--green);color:#fff}
.btn-green:disabled{opacity:.38;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--green);color:var(--gl)}
.btn-wha{background:#25D366;color:#fff;text-decoration:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:7px}
.btn-sm{padding:7px 13px;font-size:12px}
.btn-back{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0 0 14px;display:flex;align-items:center;gap:5px}
.btn-del{background:none;border:none;color:#8B1A1A;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
.btn-danger{background:none;border:none;color:#8B1A1A;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.card-click{cursor:pointer;transition:border-color .2s}
.card-click:active{border-color:rgba(93,202,165,.35)}
.lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;display:block}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--green)}
.inp::placeholder{color:var(--muted)}
textarea.inp{resize:vertical;min-height:80px;font-size:14px}
select.inp{cursor:pointer}
.ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;margin-bottom:4px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.stars{display:flex;gap:4px;align-items:center}
.star{font-size:22px;cursor:pointer;transition:transform .1s;user-select:none;line-height:1}
.star:active{transform:scale(1.3)}
.star-sm{font-size:15px;cursor:default;line-height:1}
.sk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sk-grid .sk-card:last-child:nth-child(odd){grid-column:span 2}
.sk-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px}
.sk-name{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:19px;flex-shrink:0}
.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat{background:var(--bg3);border-radius:12px;padding:12px 6px;flex:1;text-align:center}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gl);line-height:1}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px}
.notif-box{background:linear-gradient(135deg,#091f15,#0f2419);border:1px solid rgba(29,158,117,.4);border-radius:14px;padding:16px;margin-bottom:14px}
.notif-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.notif-dot{width:7px;height:7px;border-radius:50%;background:#25D366}
.notif-tag{font-size:11px;font-weight:600;color:var(--gl);text-transform:uppercase;letter-spacing:.8px}
.notif-edit{font-size:11px;color:var(--muted);margin-left:auto}
.notif-ta{width:100%;background:#0a1c11;border:1px solid rgba(93,202,165,.2);border-radius:10px;padding:12px;font-size:13px;color:var(--white);font-family:'DM Sans',sans-serif;line-height:1.7;resize:vertical;min-height:120px;outline:none}
.notif-ta:focus{border-color:var(--green)}
.notif-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.hint{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.court-line{width:36px;height:3px;background:var(--green);border-radius:99px;margin:0 auto 14px}
.fade{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cls-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.sk-pill{background:var(--bg3);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted)}
.score-big{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amber)}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.tab.on{background:var(--green);border-color:var(--green);color:#fff}
.progress-bar-wrap{flex:1;height:5px;background:#0e1a14;border-radius:99px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width .4s}
.apikey-box{background:rgba(239,159,39,.07);border:1px solid rgba(239,159,39,.25);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--amber);line-height:1.6}
.dot-loading::after{content:'.';animation:dots 1.2s steps(3,end) infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

  } catch(e){ 
    console.error("❌ EmailJS error:", e);
    const toast=document.createElement("div");
    toast.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#D85A30;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;font-family:'DM Sans',sans-serif";

    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(),6000);
  }
}

function todayStr(){return new Date().toISOString().split("T")[0]}
function calcAge(birthdate){
  if(!birthdate)return null;
  const b=new Date(birthdate),now=new Date();
  let age=now.getFullYear()-b.getFullYear();
  const m=now.getMonth()-b.getMonth();
  if(m<0||(m===0&&now.getDate()<b.getDate()))age--;
  return age;
}
function fmtDate(iso){return new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"short"})}
function fmtDateLong(iso){return new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"})}
function initials(n){return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)}
function lc(lv){return LCOLOR[lv]||"#5F5E5A"}
function avgR(s){if(!s.classes?.length)return null;return(s.classes.reduce((a,c)=>a+c.rating,0)/s.classes.length).toFixed(1)}
function rlabel(r){return["","Mal","Regular","Bien","Muy bien","Excelente"][Math.round(r)]||""}

function saveKey(k){apiKey=k;try{localStorage.setItem("tenis_key",k)}catch{}}

function el(tag,attrs,inner){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==="class")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(typeof inner==="string")e.innerHTML=inner;
  else if(Array.isArray(inner))inner.forEach(c=>c&&e.appendChild(c));
  return e;
}

function starsWidget(val,size,onChange){
  const wrap=el("div",{class:"stars"});
  [1,2,3,4,5].forEach(n=>{
    const s=el("span",{class:size==="sm"?"star-sm":"star"},"");
    s.textContent=val>=n?STAR_ON:STAR_OFF;
    s.style.color=val>=n?"#EF9F27":"#2a3e2e";
    if(onChange)s.addEventListener("click",()=>onChange(n));
    wrap.appendChild(s);
  });
  return wrap;
}

function starsRO(val,size){return starsWidget(val,size,null)}

async function genMsg(student,cls){
  const st=Object.entries(cls.skills||{}).filter(([,v])=>v>0).map(([k,v])=>`${k}: ${v}/5`).join(", ");
  const prompt=`Eres un entrenador de tenis cercano y profesional. Redacta un mensaje de WhatsApp corto y motivador para tu alumno ${student.name} tras la clase de hoy. Valoracion: ${cls.rating}/5 (${rlabel(cls.rating)}). Aspectos: ${st||"varios"}. Notas: ${cls.notes||"sin notas"}. Maximo 4 frases, espanol, SIN EMOJIS, sin asteriscos, positivo. Firma como Tu entrenador.`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:300,messages:[{role:"user",content:prompt}]})
  });
  const d=await res.json();
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  return d.content?.[0]?.text||"";
}

function waLink(phone,msg){
  const p=(phone||"").replace(/\D/g,"");
  const n=p?(p.startsWith("34")?p:"34"+p):"";
  return`https://wa.me/${n}?text=${encodeURIComponent(msg)}`;
}

function renderList(){
  const c=document.getElementById("content");
  c.className="content fade";
  c.innerHTML="";

  // NOTICE PANEL
  const noticeWrap=el("div",{style:"margin-bottom:14px"});
  loadNotice().then(curNotice=>{
    const hasPrev=curNotice&&curNotice.trim();
    noticeWrap.innerHTML=`<div style="background:#162019;border:1px solid rgba(239,159,39,0.25);border-radius:10px;padding:12px 14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${hasPrev?'8px':'0'}">
        <div style="font-size:11px;font-weight:700;color:#EF9F27;text-transform:uppercase;letter-spacing:.5px">📢 Aviso para alumnos</div>
        <button id="toggle-notice-btn" style="background:none;border:1px solid rgba(93,202,165,0.2);border-radius:6px;color:#5DCAA5;font-size:11px;cursor:pointer;padding:3px 8px;font-family:'DM Sans',sans-serif">${hasPrev?'Editar':'+ Añadir'}</button>
      </div>
      ${hasPrev?`<div style="font-size:13px;color:#eef2ee;line-height:1.5">${curNotice}</div>`:'<div style="font-size:12px;color:#7a9080">Sin avisos activos</div>'}
      <div id="notice-editor" style="display:none;margin-top:10px">
        <textarea id="notice-ta" rows="3" style="width:100%;background:#1d2b22;border:1px solid rgba(93,202,165,0.2);border-radius:8px;padding:10px;font-size:13px;color:#eef2ee;font-family:'DM Sans',sans-serif;outline:none;resize:none;box-sizing:border-box" placeholder="Escribe un aviso para todos los alumnos...">${curNotice}</textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="save-notice-btn" style="flex:1;background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Guardar</button>
          ${hasPrev?'<button id="del-notice-btn" style="background:#D85A30;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:sans-serif">Borrar</button>':''}
        </div>
      </div>
    </div>`;
    noticeWrap.querySelector('#toggle-notice-btn').onclick=()=>{
      const ed=noticeWrap.querySelector('#notice-editor');
      ed.style.display=ed.style.display==='none'?'block':'none';
    };
    noticeWrap.querySelector('#save-notice-btn').onclick=async()=>{
      const btn=noticeWrap.querySelector('#save-notice-btn');
      const txt=noticeWrap.querySelector('#notice-ta').value.trim();
      btn.textContent='Guardando...';btn.disabled=true;
      try{
        await saveNotice(txt);
        renderList();
      }catch(e){
        btn.textContent='Guardar';btn.disabled=false;
        alert('Error: '+e.message);
      }
    };
    const delBtn=noticeWrap.querySelector('#del-notice-btn');
    if(delBtn)delBtn.onclick=async()=>{
      try{await deleteNotice();renderList();}
      catch(e){alert('Error: '+e.message);}
    };
  }).catch(()=>{});
  c.appendChild(noticeWrap);

  const sorted=[...students].sort((a,b)=>a.name.localeCompare(b.name));
  const hdr=el("div",{style:"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px"});
  const info=el("div",{});

  hdr.appendChild(info);
  c.appendChild(hdr);
  if(!students.length){
    const emp=el("div",{class:"empty"});
    emp.appendChild(el("div",{class:"court-line"}));
    emp.appendChild(el("p",{style:"font-size:14px"},"Aún no tienes alumnos.<br><span style='font-size:12px'>Pulsa + Alumno para empezar.</span>"));
    c.appendChild(emp);return;
  }
  sorted.forEach(s=>{
    const a=avgR(s),last=s.classes?.[0];
    const card=el("div",{class:"card card-click",onclick:()=>{selId=s.id;tab="clases";notif={text:"",loading:false,show:false};view="student";render()}});

    const mid=el("div",{style:"flex:1"});
    mid.appendChild(el("div",{style:"font-weight:600;font-size:15px;margin-bottom:5px"},s.name));
    const badges=el("div",{style:"display:flex;gap:6px;flex-wrap:wrap"});
    const sAge=calcAge(s.birthdate);
    if(sAge!==null)badges.appendChild(el("span",{class:"badge",style:"background:#1d2b22;color:#7a9080"},sAge+" años"));
    if(s.birthdate)badges.appendChild(el("span",{class:"badge",style:"background:#1d2b22;color:#7a9080"},s.birthdate.split("-").reverse().join("/")));
    if(a)badges.appendChild(el("span",{class:"badge",style:"background:#1d2b22;color:#EF9F27"},a+" ★"));
    else badges.appendChild(el("span",{class:"badge",style:"background:#1d2b22;color:#7a9080"},"Sin clases"));
    mid.appendChild(badges);
    const right=el("div",{style:"text-align:right;flex-shrink:0"});
    right.appendChild(el("div",{style:"font-family:'Bebas Neue',sans-serif;font-size:22px;color:#5DCAA5;line-height:1"},(s.classes?.length||0)+""));
    right.appendChild(el("div",{style:"font-size:11px;color:#7a9080"},"clases"));
    if(last)right.appendChild(el("div",{style:"font-size:11px;color:#3a4f3e;margin-top:2px"},fmtDate(last.date)));
    row.appendChild(av);row.appendChild(mid);row.appendChild(right);
    card.appendChild(row);c.appendChild(card);
  });
}

        ${Object.entries(cls.skills||{}).filter(([,v])=>v>0).map(([sk,v])=>`<span class="sk-pill">${sk} ${"★".repeat(v)}</span>`).join("")}

      ${cls.notes?`<div style="background:rgba(93,202,165,0.08);border-left:3px solid #5DCAA5;border-radius:0 8px 8px 0;padding:10px 12px"><div style="font-size:10px;font-weight:700;color:#5DCAA5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Feedback del entrenador</div><p style="font-size:13px;color:#eef2ee;line-height:1.6;margin:0">${cls.notes}</p></div>`:""}`;
      clasesSection.appendChild(cd);
    });
  }
}

// Expose functions to window for use in onclick handlers inside template literals
function renderNewMatch(s,isCoach){
  document.getElementById("app").innerHTML=`<div class="header"><div style="display:flex;align-items:center;gap:10px"><img src="${LOGO}" style="width:32px;height:32px;object-fit:contain;border-radius:50%"/><div class="logo" style="font-size:16px">TEIXERETA IBI</div></div><button onclick="window._goBack()" style="background:transparent;border:1px solid rgba(93,202,165,0.14);color:#7a9080;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">← Volver</button></div><div class="content" id="mf"></div>`;
  window._goBack=()=>{if(isCoach){view="student";tab="competicion";render();}else{renderStudentDetail(students.find(x=>x.id===s.id)||s);}};
  const mf=document.getElementById("mf");
  const match={id:Date.now().toString(),fecha:new Date().toISOString().split("T")[0],torneo:"",ronda:"",rival:"",nivelRival:"Bajo",club:"",resultado:"Ganado",actitudAntes:{raquetero:true,equipamiento:true,puntual:true,mentalidad:"Positiva",calentamiento:true},actitudPista:{actitudPerdiendo:"Positiva",respeta:true,soluciones:true},actitudDespues:{consciente:true,emociones:"Sí"},set1:{golpes:"",tactica:""},set2:{golpes:"",tactica:""},set3:{golpes:"",tactica:""},set3tipo:"",notas:""};
  function mkSec(t){const h=document.createElement("div");h.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:#5DCAA5;margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid rgba(93,202,165,0.2)";h.textContent=t;return h;}
  function mkInp(lbl,key,obj,ph){const w=document.createElement("div");w.style.marginBottom="4px";w.innerHTML=`<label class="lbl">${lbl}</label>`;const i=document.createElement("input");i.className="inp";i.placeholder=ph||"";i.value=obj[key]||"";i.oninput=e=>obj[key]=e.target.value;w.appendChild(i);return w;}
  function mkBtns(lbl,key,obj,opts){const w=document.createElement("div");w.style.cssText="padding:10px 0;border-bottom:1px solid rgba(93,202,165,0.07)";if(lbl)w.innerHTML=`<div style="font-size:13px;color:#eef2ee;margin-bottom:8px">${lbl}</div>`;const row=document.createElement("div");row.style.cssText="display:flex;gap:6px;flex-wrap:wrap";opts.forEach(v=>{const b=document.createElement("button");b.textContent=v;const isAct=obj[key]===v||(v==="Sí"&&obj[key]===true)||(v==="No"&&obj[key]===false);b.style.cssText=`padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:${isAct?"#1D9E75":"#1d2b22"};color:${isAct?"#fff":"#7a9080"}`;b.onclick=()=>{if(v==="Sí")obj[key]=true;else if(v==="No")obj[key]=false;else obj[key]=v;row.querySelectorAll("button").forEach(x=>{const a=obj[key]===x.textContent||(x.textContent==="Sí"&&obj[key]===true)||(x.textContent==="No"&&obj[key]===false);x.style.background=a?"#1D9E75":"#1d2b22";x.style.color=a?"#fff":"#7a9080";});};row.appendChild(b);});w.appendChild(row);return w;}
  mf.appendChild(mkSec("Datos del partido"));
  const c1=document.createElement("div");c1.className="card";
  c1.appendChild(mkInp("Torneo","torneo",match,"Ej: Open Ibi 2026"));c1.appendChild(mkInp("Ronda","ronda",match,"Ej: Cuartos, Semifinal..."));c1.appendChild(mkInp("Nombre del rival","rival",match,"Ej: Pedro García"));c1.appendChild(mkInp("Club del rival","club",match,"Ej: CT Alcoy"));c1.appendChild(mkBtns("Nivel del rival","nivelRival",match,["Bajo","Bajo/Medio","Medio","Medio/Alto","Alto"]));mf.appendChild(c1);
  mf.appendChild(mkSec("Actitud antes del partido"));
  const c2=document.createElement("div");c2.className="card";
  c2.appendChild(mkBtns("¿Has preparado tu raquetero?","raquetero",match.actitudAntes,["Sí","No"]));c2.appendChild(mkBtns("¿Llevas el equipamiento adecuado?","equipamiento",match.actitudAntes,["Sí","No"]));c2.appendChild(mkBtns("¿Has llegado a tiempo?","puntual",match.actitudAntes,["Sí","No"]));c2.appendChild(mkBtns("¿Has calentado antes de entrar en pista?","calentamiento",match.actitudAntes,["Sí","No"]));c2.appendChild(mkBtns("Tu mentalidad antes del partido","mentalidad",match.actitudAntes,["Positiva","Negativa"]));mf.appendChild(c2);
  mf.appendChild(mkSec("Actitud en la pista"));
  const c3=document.createElement("div");c3.className="card";
  c3.appendChild(mkBtns("Cuando vas perdiendo tu actitud es...","actitudPerdiendo",match.actitudPista,["Positiva","Negativa"]));c3.appendChild(mkBtns("¿Respetas al contrario?","respeta",match.actitudPista,["Sí","No"]));c3.appendChild(mkBtns("¿Intentas encontrar soluciones?","soluciones",match.actitudPista,["Sí","No"]));mf.appendChild(c3);
  mf.appendChild(mkSec("Actitud después del partido"));
  const c4=document.createElement("div");c4.className="card";
  c4.appendChild(mkBtns("¿Eres consciente de si has jugado bien o mal?","consciente",match.actitudDespues,["Sí","No"]));c4.appendChild(mkBtns("¿Controlas tus emociones?","emociones",match.actitudDespues,["Sí","No","A medias"]));mf.appendChild(c4);
  [1,2].forEach(num=>{
    const so=num===1?match.set1:match.set2;
    if(!so.marcador)so.marcador="";
    mf.appendChild(mkSec(num+"º Set"));
    const cs=document.createElement("div");cs.className="card";
    // Campo marcador
    const mRow=document.createElement("div");mRow.style.marginBottom="4px";
    mRow.innerHTML=`<label class="lbl">Resultado del set (ej: 6-4)</label>`;
    const mInp=document.createElement("input");mInp.className="inp";
    mInp.placeholder="Ej: 6-4";mInp.value=so.marcador||"";
    mInp.oninput=e=>so.marcador=e.target.value;
    mRow.appendChild(mInp);cs.appendChild(mRow);
    cs.appendChild(mkBtns("¿Busca un objetivo en sus golpes? (dirección, profundidad, variación...)","golpes",so,["Sí","No","A veces"]));
    cs.appendChild(mkBtns("Tácticamente","tactica",so,["Intenta imponer su juego","Se basa en el juego del rival"]));
    mf.appendChild(cs);
  });
  // 3er Set / Super Tie Break
  mf.appendChild(mkSec("3er Set / Super Tie Break"));
  const c3s=document.createElement("div");c3s.className="card";
  const tipoRow=document.createElement("div");tipoRow.style.cssText="padding:10px 0;border-bottom:1px solid rgba(93,202,165,0.07)";
  tipoRow.innerHTML=`<div style="font-size:13px;color:#eef2ee;margin-bottom:8px">¿Hubo 3er set o super tie break?</div>`;
  const tipoRow2=document.createElement("div");tipoRow2.style.cssText="display:flex;gap:6px;flex-wrap:wrap";
  ["No hubo","3er Set","Super Tie Break"].forEach(v=>{
    const b=document.createElement("button");b.textContent=v;
    const isAct=match.set3tipo===v||(v==="No hubo"&&!match.set3tipo);
    b.style.cssText=`padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:${isAct?"#1D9E75":"#1d2b22"};color:${isAct?"#fff":"#7a9080"}`;
    b.onclick=()=>{
      match.set3tipo=v==="No hubo"?"":v;
      tipoRow2.querySelectorAll("button").forEach(x=>{const a=x.textContent===v;x.style.background=a?"#1D9E75":"#1d2b22";x.style.color=a?"#fff":"#7a9080";});
      set3content.style.display=(v==="No hubo")?"none":"block";
      // Update placeholder based on type
      if(v==="3er Set") s3inp.placeholder="Ej: 6-4";
      else if(v==="Super Tie Break") s3inp.placeholder="Ej: 10-7";
    };
    tipoRow2.appendChild(b);
  });
  tipoRow.appendChild(tipoRow2);c3s.appendChild(tipoRow);
  const set3content=document.createElement("div");set3content.style.display="none";set3content.style.marginTop="10px";
  if(!match.set3)match.set3={marcador:"",golpes:"",tactica:""};
  const s3scoreRow=document.createElement("div");s3scoreRow.style.marginBottom="4px";
  s3scoreRow.innerHTML=`<label class="lbl" id="s3label">Resultado del set</label>`;
  const s3inp=document.createElement("input");s3inp.className="inp";s3inp.placeholder="Ej: 10-7";
  s3inp.oninput=e=>match.set3.marcador=e.target.value;
  s3scoreRow.appendChild(s3inp);set3content.appendChild(s3scoreRow);
  set3content.appendChild(mkBtns("¿Busca un objetivo en sus golpes?","golpes",match.set3,["Sí","No","A veces"]));
  set3content.appendChild(mkBtns("Tácticamente","tactica",match.set3,["Intenta imponer su juego","Se basa en el juego del rival"]));
  c3s.appendChild(set3content);mf.appendChild(c3s);
  mf.appendChild(mkSec("Resultado final"));
  const c5=document.createElement("div");c5.className="card";
  c5.appendChild(mkBtns("¿Has ganado o perdido?","resultado",match,["Ganado","Perdido"]));
  const nr=document.createElement("div");nr.style.marginTop="14px";nr.innerHTML=`<label class="lbl">Notas adicionales</label>`;
  const ta=document.createElement("textarea");ta.className="inp";ta.placeholder="Observaciones del partido...";ta.rows=3;ta.oninput=e=>match.notas=e.target.value;nr.appendChild(ta);c5.appendChild(nr);
  const sb=document.createElement("button");sb.className="btn btn-green";sb.style.cssText="width:100%;margin-top:12px;font-size:15px;padding:14px";sb.textContent="Guardar partido";
  sb.onclick=async()=>{if(!match.rival.trim()){alert("Añade el nombre del rival.");return;}sb.disabled=true;sb.textContent="Guardando...";try{await addMatchDB(s.id,match);sendMatchEmail(s.name||"Alumno",match).catch(e=>console.error("Email error:",e));window._goBack();}catch(e){sb.disabled=false;sb.textContent="Guardar partido";alert("Error: "+e.message);}};
  c5.appendChild(sb);mf.appendChild(c5);
}
async function addMatchDB(sid,md){const idx=students.findIndex(s=>s.id===sid);if(idx===-1)return;const m=[md,...(students[idx].matches||[])];await updateStudentDB(sid,{matches:m});students[idx].matches=m;}
async function deleteMatchDB(sid,mid){const idx=students.findIndex(s=>s.id===sid);if(idx===-1)return;const m=(students[idx].matches||[]).filter(x=>x.id!==mid);await updateStudentDB(sid,{matches:m});students[idx].matches=m;}
window.renderNewMatch=(s,c)=>renderNewMatch(s,c);
window.sendMatchEmail=(n,m)=>sendMatchEmail(n,m);
window.deleteMatchDB=(a,b)=>deleteMatchDB(a,b);

async function loadNotice(){
  try{
    const d = await getDocs(collection(db,"config"));
    const doc_ = d.docs.find(x=>x.id==="notice");
    return doc_?.data()?.text||"";
  }catch(e){ return ""; }
}
async function saveNotice(text){
  try{
    await setDoc(doc(db,"config","notice"),{text:text||"",updatedAt:new Date().toISOString()});
  }catch(e){
    // Try with updateDoc if setDoc fails
    console.error("saveNotice error:",e);
    throw e;
  }
}
async function deleteNotice(){
  await setDoc(doc(db,"config","notice"),{text:""});
}

window.deleteMatchDB = (a,b) => deleteMatchDB(a,b);
window._goBack = () => {};

// Handle redirect result on page load
getRedirectResult(auth).catch(e => console.log("Redirect result:", e));

let cachedUser = null;

onAuthStateChanged(auth, async user => {
  cachedUser = user;
  // Always show login screen - let user choose their role
  // If already authenticated as coach, update the coach button
  renderLoginScreen();
  if(user && AUTHORIZED_COACHES.includes(user.email)){
    // Show "Continuar" button instead of Google login
    const coachArea = document.getElementById("coach-area");
    const googleBtn = document.getElementById("google-btn");
    if(coachArea && googleBtn){
      googleBtn.style.display = "none";
      const continueBtn = document.createElement("button");
      continueBtn.style.cssText = "width:100%;background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px";
      if(user.photoURL){ continueBtn.innerHTML=`<img src="${user.photoURL}" style="width:22px;height:22px;border-radius:50%"/> Continuar como ${user.displayName?.split(" ")[0]||"entrenador"}`; }
      else { continueBtn.textContent = `Continuar como ${user.displayName?.split(" ")[0]||"entrenador"}`; }
      continueBtn.onclick = () => enterCoachApp(user);
      coachArea.insertBefore(continueBtn, coachArea.firstChild);
      const changeBtn = document.createElement("button");
      changeBtn.style.cssText = "width:100%;background:transparent;color:#7a9080;border:1px solid rgba(93,202,165,0.14);border-radius:10px;padding:9px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px";
      changeBtn.textContent = "Cambiar de cuenta";
      changeBtn.onclick = async () => { await signOut(auth); renderLoginScreen(); };
      coachArea.appendChild(changeBtn);
    }
  }
});

async function enterCoachApp(user){
  currentUser = user;
  if(!AUTHORIZED_COACHES.includes(user.email?.toLowerCase())){
    await signOut(auth);
    alert("Cuenta no autorizada: "+user.email);
    renderLoginScreen();
    return;
  }
  try{ await loadStudents(); }catch(e){ students=[]; }
  try{
  document.getElementById("app").innerHTML = `
      <div class="header">
        <div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="window.renderLoginScreen()" title="Cerrar sesión">
          <img src="${LOGO}" style="width:32px;height:32px;object-fit:contain;border-radius:50%;opacity:0.9"/>
          <div class="logo" style="font-size:16px;letter-spacing:2px">TEIXERETA IBI</div>
        </div>
        <div id="header-btns" style="display:flex;gap:8px;align-items:center"></div>
      </div>
      <div class="content fade" id="content"></div>`;
    const hb = document.getElementById("header-btns");
    const chip=document.createElement("div");chip.style.cssText="display:flex;align-items:center;gap:8px;font-size:12px;color:#7a9080";
    if(user.photoURL){const img=document.createElement("img");img.src=user.photoURL;img.style.cssText="width:26px;height:26px;border-radius:50%;object-fit:cover";chip.appendChild(img);}
    const nm=document.createElement("span");nm.textContent=user.displayName?.split(" ")[0]||"";chip.appendChild(nm);
    const out=document.createElement("button");out.className="btn btn-ghost btn-sm";out.textContent="Salir";out.onclick=()=>signOut(auth);
    hb.appendChild(chip);hb.appendChild(out);
    view="list"; render();
    }catch(e){ console.error("App rebuild error:",e); }
  try{
      onSnapshot(collection(db,"students"), async () => {
        try{ await loadStudents(); if(view==="list") render(); }catch(e){}
      });
    }catch(e){ console.error("Snapshot error:",e); }
}
