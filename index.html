<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0e1a14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Tennis Coach"/>
<title>Tennis Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e1a14;--bg2:#162019;--bg3:#1d2b22;--green:#1D9E75;--gl:#5DCAA5;--white:#eef2ee;--muted:#7a9080;--border:rgba(93,202,165,0.14);--amber:#EF9F27;--red:#D85A30}
html,body{background:var(--bg);height:100%;font-family:'DM Sans',sans-serif;color:var(--white);-webkit-tap-highlight-color:transparent}
.app{min-height:100vh;min-height:100dvh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gl);display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0}
.content{padding:16px;max-width:600px;margin:0 auto;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;-webkit-appearance:none;display:inline-flex;align-items:center;gap:6px}
.btn:active{opacity:.75}
.btn-green{background:var(--green);color:#fff}
.btn-green:disabled{opacity:.38;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--green);color:var(--gl)}
.btn-wha{background:#25D366;color:#fff;text-decoration:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:7px}
.btn-sm{padding:7px 13px;font-size:12px}
.btn-back{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0 0 14px;display:flex;align-items:center;gap:5px}
.btn-del{background:none;border:none;color:#8B1A1A;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
.btn-danger{background:none;border:none;color:#8B1A1A;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.card-click{cursor:pointer;transition:border-color .2s}
.card-click:active{border-color:rgba(93,202,165,.35)}
.lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;display:block}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--green)}
.inp::placeholder{color:var(--muted)}
textarea.inp{resize:vertical;min-height:80px;font-size:14px}
select.inp{cursor:pointer}
.ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;margin-bottom:4px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.stars{display:flex;gap:4px;align-items:center}
.star{font-size:22px;cursor:pointer;transition:transform .1s;user-select:none;line-height:1}
.star:active{transform:scale(1.3)}
.star-sm{font-size:15px;cursor:default;line-height:1}
.sk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sk-grid .sk-card:last-child:nth-child(odd){grid-column:span 2}
.sk-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px}
.sk-name{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:19px;flex-shrink:0}
.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat{background:var(--bg3);border-radius:12px;padding:12px 6px;flex:1;text-align:center}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gl);line-height:1}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px}
.notif-box{background:linear-gradient(135deg,#091f15,#0f2419);border:1px solid rgba(29,158,117,.4);border-radius:14px;padding:16px;margin-bottom:14px}
.notif-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.notif-dot{width:7px;height:7px;border-radius:50%;background:#25D366}
.notif-tag{font-size:11px;font-weight:600;color:var(--gl);text-transform:uppercase;letter-spacing:.8px}
.notif-edit{font-size:11px;color:var(--muted);margin-left:auto}
.notif-ta{width:100%;background:#0a1c11;border:1px solid rgba(93,202,165,.2);border-radius:10px;padding:12px;font-size:13px;color:var(--white);font-family:'DM Sans',sans-serif;line-height:1.7;resize:vertical;min-height:120px;outline:none}
.notif-ta:focus{border-color:var(--green)}
.notif-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.hint{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.court-line{width:36px;height:3px;background:var(--green);border-radius:99px;margin:0 auto 14px}
.fade{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cls-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.sk-pill{background:var(--bg3);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted)}
.score-big{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amber)}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.tab.on{background:var(--green);border-color:var(--green);color:#fff}
.progress-bar-wrap{flex:1;height:5px;background:#0e1a14;border-radius:99px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width .4s}
.apikey-box{background:rgba(239,159,39,.07);border:1px solid rgba(239,159,39,.25);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--amber);line-height:1.6}
.dot-loading::after{content:'.';animation:dots 1.2s steps(3,end) infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
</style>
</head>

function todayStr(){return new Date().toISOString().split("T")[0]}
function calcAge(birthdate){
  if(!birthdate)return null;
  const b=new Date(birthdate),now=new Date();
  let age=now.getFullYear()-b.getFullYear();
  const m=now.getMonth()-b.getMonth();
  if(m<0||(m===0&&now.getDate()<b.getDate()))age--;
  return age;
}
function fmtDate(iso){return new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"short"})}
function fmtDateLong(iso){return new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"})}
function initials(n){return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)}
function lc(lv){return LCOLOR[lv]||"#5F5E5A"}
function avgR(s){if(!s.classes?.length)return null;return(s.classes.reduce((a,c)=>a+c.rating,0)/s.classes.length).toFixed(1)}
function rlabel(r){return["","A mejorar","Regular","Bien","Muy bien","Excelente"][Math.round(r)]||""}
async function persist(){}
async function addStudentDB(data){
  const ref = await addDoc(collection(db,"students"),{...data,classes:[],createdAt:new Date().toISOString()});
  return ref.id;
}
async function updateStudentDB(id,data){
  await updateDoc(doc(db,"students",id),data);
}
async function addMatchDB(studentId, matchData){
  const idx = students.findIndex(s=>s.id===studentId);
  if(idx===-1) return;
  const matches = [matchData, ...(students[idx].matches||[])];
  await updateDoc(doc(db,"students",studentId),{matches});
  students[idx].matches = matches;
}
async function deleteMatchDB(studentId, matchId){
  const idx = students.findIndex(s=>s.id===studentId);
  if(idx===-1) return;
  const matches = (students[idx].matches||[]).filter(m=>m.id!==matchId);
  await updateDoc(doc(db,"students",studentId),{matches});
  students[idx].matches = matches;
}
async function removeStudentDB(id){
  await deleteDoc(doc(db,"students",id));
}
async function loadStudents(){
  const snap = await getDocs(query(collection(db,"students"),orderBy("name")));
  students = snap.docs.map(d=>({id:d.id,...d.data(),classes:d.data().classes||[]}));
}

function saveKey(k){apiKey=k;try{localStorage.setItem("tenis_key",k)}catch{}}

function el(tag,attrs,inner){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==="class")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(typeof inner==="string")e.innerHTML=inner;
  else if(Array.isArray(inner))inner.forEach(c=>c&&e.appendChild(c));
  return e;
}

function starsWidget(val,size,onChange){
  const wrap=el("div",{class:"stars"});
  [1,2,3,4,5].forEach(n=>{
    const s=el("span",{class:size==="sm"?"star-sm":"star"},"");
    s.textContent=val>=n?STAR_ON:STAR_OFF;
    s.style.color=val>=n?"#EF9F27":"#2a3e2e";
    if(onChange)s.addEventListener("click",()=>onChange(n));
    wrap.appendChild(s);
  });
  return wrap;
}

function starsRO(val,size){return starsWidget(val,size,null)}

async function genMsg(student,cls){
  const st=Object.entries(cls.skills||{}).filter(([,v])=>v>0).map(([k,v])=>`${k}: ${v}/5`).join(", ");
  const prompt=`Eres un entrenador de tenis cercano y profesional. Redacta un mensaje de WhatsApp corto y motivador para tu alumno ${student.name} tras la clase de hoy. Valoracion: ${cls.rating}/5 (${rlabel(cls.rating)}). Aspectos: ${st||"varios"}. Notas: ${cls.notes||"sin notas"}. Maximo 4 frases, espanol, SIN EMOJIS, sin asteriscos, positivo. Firma como Tu entrenador.`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:300,messages:[{role:"user",content:prompt}]})
  });
  const d=await res.json();
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  return d.content?.[0]?.text||"";
}

function waLink(phone,msg){
  const p=(phone||"").replace(/\D/g,"");
  const n=p?(p.startsWith("34")?p:"34"+p):"";
  return`https://wa.me/${n}?text=${encodeURIComponent(msg)}`;
}

          bw.appendChild(bar);row.appendChild(bw);

          sc.appendChild(row);sg.appendChild(sc);

}

        <input id="name-input" type="text" placeholder="Tu nombre completo" autocomplete="off" style="width:100%;background:#1d2b22;border:1px solid rgba(93,202,165,0.14);border-radius:8px;padding:10px 12px;font-size:14px;color:#eef2ee;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:8px"/>

  document.getElementById("coach-btn").onclick = () => {
    const a = document.getElementById("coach-area");
    a.style.display = a.style.display==="none"?"block":"none";
    document.getElementById("student-area").style.display="none";
  };
  document.getElementById("google-btn").onclick = async () => {
    const errEl = document.getElementById("coach-error");
    try{
      const result = await signInWithPopup(auth, new GoogleAuthProvider());
      if(result?.user) await enterCoachApp(result.user);
    } catch(e){
      if(e.code === "auth/popup-blocked" || e.code === "auth/popup-closed-by-user"){
        try{ await signInWithRedirect(auth, new GoogleAuthProvider()); }
        catch(e2){ if(errEl) errEl.style.display="block"; }
      } else if(e.code !== "auth/cancelled-popup-request"){
        if(errEl) errEl.style.display="block";
      }
    }
  };
  document.getElementById("student-btn").onclick = () => {
    const a = document.getElementById("student-area");
    a.style.display = a.style.display==="none"?"block":"none";
    document.getElementById("coach-area").style.display="none";
  };
  document.getElementById("student-access-btn").onclick = async () => {
    const pin = document.getElementById("pin-input").value;
    const nameQ = document.getElementById("name-input").value.trim().toLowerCase();
    const dateQ = document.getElementById("date-input").value;
    const errEl = document.getElementById("student-error");
    const btn = document.getElementById("student-access-btn");
    if(pin!==STUDENT_PIN||!nameQ||!dateQ){ errEl.style.display="block"; return; }
    btn.disabled=true; btn.textContent="Verificando...";
    try{ await loadStudents(); }catch(e){}
    const found = students.find(s=>{
      const nm = s.name.toLowerCase().includes(nameQ)||nameQ.includes(s.name.toLowerCase().split(" ")[0]);
      return nm && s.birthdate===dateQ;
    });
    btn.disabled=false; btn.textContent="Ver mis clases";
    if(found){ 
      errEl.style.display="none"; 
      renderStudentDetail(found); 
    } else { 
      errEl.textContent = "PIN, nombre o fecha incorrectos. Asegúrate de que el nombre y la fecha de nacimiento coinciden exactamente con los que tiene el club.";
      errEl.style.display="block"; 
    }
  };
}

function renderCompSection(s, container){
  container.innerHTML="";
  // Add match button
  const addBtn=document.createElement("button");
  addBtn.className="btn btn-green";addBtn.style.cssText="width:100%;margin-bottom:14px";
  addBtn.textContent="+ Nuevo partido";
  addBtn.onclick=()=>renderNewMatch(s);
  container.appendChild(addBtn);

  const matches=s.matches||[];
  if(!matches.length){
    container.innerHTML+='<div class="empty"><div class="court-line"></div><p style="font-size:13px">Sin partidos registrados aún.</p></div>';
    return;
  }
  matches.forEach(m=>{
    const card=document.createElement("div");card.className="cls-card";
    const won=m.resultado==="Ganado";
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div style="font-weight:600;font-size:14px;margin-bottom:3px">${m.torneo||"Torneo"}</div>
          <div style="font-size:12px;color:#7a9080">${m.fecha} · ${m.ronda||""}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="background:${won?"rgba(29,158,117,0.2)":"rgba(216,90,48,0.2)"};color:${won?"#5DCAA5":"#D85A30"};padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600">${m.resultado}</span>
          <button onclick="deleteMatchDB('${s.id}','${m.id}').then(()=>renderStudentDetail(students.find(x=>x.id==='${s.id}')))" style="background:none;border:none;color:#8B1A1A;font-size:18px;cursor:pointer">×</button>
        </div>
      </div>
      <div style="font-size:13px;color:#7a9080;margin-bottom:8px">Rival: <span style="color:#eef2ee">${m.rival}</span> · ${m.nivelRival||""} · ${m.club||""}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;margin-bottom:8px">
        <div style="background:#1d2b22;border-radius:8px;padding:8px">
          <div style="color:#7a9080;margin-bottom:4px;text-transform:uppercase;font-size:10px;letter-spacing:.5px">Set 1</div>
          ${m.set1?`<div>Golpes: ${m.set1.golpes||"-"}</div><div>Táctica: ${m.set1.tactica||"-"}</div>`:"Sin datos"}
        </div>
        <div style="background:#1d2b22;border-radius:8px;padding:8px">
          <div style="color:#7a9080;margin-bottom:4px;text-transform:uppercase;font-size:10px;letter-spacing:.5px">Set 2</div>
          ${m.set2?`<div>Golpes: ${m.set2.golpes||"-"}</div><div>Táctica: ${m.set2.tactica||"-"}</div>`:"Sin datos"}
        </div>
      </div>
      ${m.notas?`<p style="font-size:12px;color:#7a9080;line-height:1.6">${m.notas}</p>`:""}`;
    container.appendChild(card);
  });
}

function renderNewMatch(s){
  const app=document.getElementById("app");
  const savedApp=app.innerHTML;
  app.innerHTML=`
    <div class="header">
      <div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="renderStudentDetail(students.find(x=>x.id==='${s.id}'))">
        <img src="${document.querySelector('img') ? document.querySelector('.header img')?.src || '' : ''}" style="width:32px;height:32px;object-fit:contain;border-radius:50%"/>
        <div class="logo" style="font-size:16px">TEIXERETA IBI</div>
      </div>
      <button onclick="renderStudentDetail(students.find(x=>x.id==='${s.id}'))" style="background:transparent;border:1px solid rgba(93,202,165,0.14);color:#7a9080;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">← Volver</button>
    </div>
    <div class="content" id="match-form"></div>`;

  const mf=document.getElementById("match-form");
  const match={
    id:Date.now().toString(), fecha:new Date().toISOString().split("T")[0],
    torneo:"",ronda:"",rival:"",nivelRival:"Bajo",club:"",resultado:"Ganado",
    actitudAntes:{raquetero:true,equipamiento:true,puntual:true,mentalidad:"Positiva",calentamiento:true},
    actitudPista:{actitudPerdiendo:"Positiva",respeta:true,soluciones:true},
    actitudDespues:{consciente:true,emociones:"Sí"},
    set1:{golpes:"",tactica:""},set2:{golpes:"",tactica:""},notas:""
  };

  function yn(label, key, obj){
    const row=document.createElement("div");
    row.style.cssText="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(93,202,165,0.08)";
    row.innerHTML=`<span style="font-size:13px;color:#eef2ee;flex:1;padding-right:12px">${label}</span>`;
    const btns=document.createElement("div");btns.style.cssText="display:flex;gap:6px;flex-shrink:0";
    ["Sí","No"].forEach(v=>{
      const b=document.createElement("button");
      b.textContent=v;b.dataset.val=v;
      const isActive=(obj[key]===true&&v==="Sí")||(obj[key]===false&&v==="No")||(obj[key]===v);
      b.style.cssText=`padding:5px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:${isActive?(v==="Sí"?"#1D9E75":"#D85A30"):"#1d2b22"};color:${isActive?"#fff":"#7a9080"}`;
      b.onclick=()=>{
        obj[key]=v==="Sí"?true:false;
        btns.querySelectorAll("button").forEach(x=>{
          const active=(obj[key]===true&&x.dataset.val==="Sí")||(obj[key]===false&&x.dataset.val==="No");
          x.style.background=active?(x.dataset.val==="Sí"?"#1D9E75":"#D85A30"):"#1d2b22";
          x.style.color=active?"#fff":"#7a9080";
        });
      };
      btns.appendChild(b);
    });
    row.appendChild(btns);return row;
  }

  function sel3(label, key, obj, opts){
    const row=document.createElement("div");
    row.style.cssText="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(93,202,165,0.08);flex-wrap:wrap;gap:8px";
    row.innerHTML=`<span style="font-size:13px;color:#eef2ee;width:100%">${label}</span>`;
    const btns=document.createElement("div");btns.style.cssText="display:flex;gap:6px;flex-wrap:wrap";
    opts.forEach(v=>{
      const b=document.createElement("button");b.textContent=v;b.dataset.val=v;
      const active=obj[key]===v;
      b.style.cssText=`padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:${active?"#1D9E75":"#1d2b22"};color:${active?"#fff":"#7a9080"}`;
      b.onclick=()=>{obj[key]=v;btns.querySelectorAll("button").forEach(x=>{x.style.background=x.dataset.val===v?"#1D9E75":"#1d2b22";x.style.color=x.dataset.val===v?"#fff":"#7a9080"})};
      btns.appendChild(b);
    });
    row.appendChild(btns);return row;
  }

  function inp(label,key,obj,ph){
    const w=document.createElement("div");w.style.marginBottom="0";
    w.innerHTML=`<label class="lbl">${label}</label>`;
    const i=document.createElement("input");i.className="inp";i.placeholder=ph||"";i.value=obj[key]||"";
    i.oninput=e=>obj[key]=e.target.value;w.appendChild(i);return w;
  }

  function section(title){
    const h=document.createElement("div");
    h.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:#5DCAA5;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(93,202,165,0.2)";
    h.textContent=title;return h;
  }

  // DATOS GENERALES
  mf.appendChild(section("Datos del partido"));
  const card1=document.createElement("div");card1.className="card";
  card1.appendChild(inp("Torneo","torneo",match,"Ej: Open Ibi 2026"));
  card1.appendChild(inp("Ronda","ronda",match,"Ej: Cuartos, Semifinal..."));
  card1.appendChild(inp("Nombre del rival","rival",match,"Ej: Pedro García"));
  card1.appendChild(inp("Club del rival","club",match,"Ej: CT Alcoy"));
  card1.appendChild(sel3("Nivel del rival","nivelRival",match,["Bajo","Bajo/Medio","Medio","Medio/Alto","Alto"]).cloneNode(true));
  // Fix sel3 for nivelRival
  const nrRow=sel3("Nivel del rival","nivelRival",match,["Bajo","Bajo/Medio","Medio","Medio/Alto","Alto"]);
  card1.appendChild(nrRow);
  mf.appendChild(card1);

  // ACTITUD ANTES
  mf.appendChild(section("Actitud antes del partido"));
  const card2=document.createElement("div");card2.className="card";
  card2.appendChild(yn("¿Has preparado tu raquetero?","raquetero",match.actitudAntes));
  card2.appendChild(yn("¿Llevas el equipamiento adecuado?","equipamiento",match.actitudAntes));
  card2.appendChild(yn("¿Has llegado a tiempo?","puntual",match.actitudAntes));
  card2.appendChild(yn("¿Has calentado antes de entrar?","calentamiento",match.actitudAntes));
  card2.appendChild(sel3("Tu mentalidad antes del partido","mentalidad",match.actitudAntes,["Positiva","Negativa"]));
  mf.appendChild(card2);

  // ACTITUD EN PISTA
  mf.appendChild(section("Actitud en la pista"));
  const card3=document.createElement("div");card3.className="card";
  card3.appendChild(sel3("Cuando vas perdiendo tu actitud es...","actitudPerdiendo",match.actitudPista,["Positiva","Negativa"]));
  card3.appendChild(yn("¿Respetas al contrario?","respeta",match.actitudPista));
  card3.appendChild(yn("¿Intentas buscar soluciones?","soluciones",match.actitudPista));
  mf.appendChild(card3);

  // ACTITUD DESPUÉS
  mf.appendChild(section("Actitud después del partido"));
  const card4=document.createElement("div");card4.className="card";
  card4.appendChild(yn("¿Eres consciente de si has jugado bien o mal?","consciente",match.actitudDespues));
  card4.appendChild(sel3("¿Controlas tus emociones (ganando o perdiendo)?","emociones",match.actitudDespues,["Sí","No","A medias"]));
  mf.appendChild(card4);

  // SET 1
  function setSection(num, setObj){
    mf.appendChild(section(`${num}º Set`));
    const c=document.createElement("div");c.className="card";
    const gRow=document.createElement("div");gRow.style.marginBottom="14px";
    gRow.innerHTML=`<label class="lbl">Golpes — ¿busca objetivo en sus golpes (dirección, profundidad, variación)?</label>`;
    const g=document.createElement("div");g.style.cssText="display:flex;gap:8px;flex-wrap:wrap";
    ["Sí","No","A veces"].forEach(v=>{
      const b=document.createElement("button");b.textContent=v;b.dataset.val=v;
      b.style.cssText=`padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:${setObj.golpes===v?"#1D9E75":"#1d2b22"};color:${setObj.golpes===v?"#fff":"#7a9080"}`;
      b.onclick=()=>{setObj.golpes=v;g.querySelectorAll("button").forEach(x=>{x.style.background=x.dataset.val===v?"#1D9E75":"#1d2b22";x.style.color=x.dataset.val===v?"#fff":"#7a9080"})};
      g.appendChild(b);
    });
    gRow.appendChild(g);c.appendChild(gRow);
    const tRow=document.createElement("div");
    tRow.innerHTML=`<label class="lbl">Tácticamente</label>`;
    const t=document.createElement("div");t.style.cssText="display:flex;gap:8px;flex-wrap:wrap";
    ["Impone su juego","Se basa en el rival"].forEach(v=>{
      const b=document.createElement("button");b.textContent=v;b.dataset.val=v;
      b.style.cssText=`padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:${setObj.tactica===v?"#1D9E75":"#1d2b22"};color:${setObj.tactica===v?"#fff":"#7a9080"}`;
      b.onclick=()=>{setObj.tactica=v;t.querySelectorAll("button").forEach(x=>{x.style.background=x.dataset.val===v?"#1D9E75":"#1d2b22";x.style.color=x.dataset.val===v?"#fff":"#7a9080"})};
      t.appendChild(b);
    });
    tRow.appendChild(t);c.appendChild(tRow);
    mf.appendChild(c);
  }
  setSection(1,match.set1);
  setSection(2,match.set2);

  // RESULTADO FINAL
  mf.appendChild(section("Resultado final"));
  const card5=document.createElement("div");card5.className="card";
  card5.appendChild(sel3("¿Has ganado o perdido el partido?","resultado",match,["Ganado","Perdido"]));

  const taRow=document.createElement("div");taRow.style.marginTop="14px";
  taRow.innerHTML=`<label class="lbl">Notas adicionales</label>`;
  const ta=document.createElement("textarea");ta.className="inp";ta.placeholder="Observaciones generales del partido...";
  ta.oninput=e=>match.notas=e.target.value;taRow.appendChild(ta);card5.appendChild(taRow);

  const saveBtn=document.createElement("button");saveBtn.className="btn btn-green";saveBtn.style.cssText="width:100%;margin-top:8px;font-size:14px";saveBtn.textContent="Guardar partido";
  saveBtn.onclick=async()=>{
    if(!match.rival.trim()){alert("Añade el nombre del rival.");return;}
    saveBtn.disabled=true;saveBtn.textContent="Guardando...";
    try{
      await addMatchDB(s.id,match);
      renderStudentDetail(students.find(x=>x.id===s.id));
    }catch(e){
      saveBtn.disabled=false;saveBtn.textContent="Guardar partido";
      alert("Error al guardar: "+e.message);
    }
  };
  card5.appendChild(saveBtn);
  mf.appendChild(card5);
}
